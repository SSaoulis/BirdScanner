[mypy]
# src/ modules import their siblings by flat name (they run with cwd=src), so add
# src to the search path; this lets those imports resolve when tests/ (which import
# via the src.* package path) are checked in the same run.
mypy_path = src

# Third-party / platform modules without type information.
# libcamera and picamera2 are Pi-only native bindings (not installable off-Pi);
# onnxruntime, psutil and paramiko ship no type stubs. Silence the missing-import
# noise so mypy reports only genuine type errors in our own code.

[mypy-libcamera.*]
ignore_missing_imports = True

[mypy-picamera2.*]
ignore_missing_imports = True

[mypy-onnxruntime.*]
ignore_missing_imports = True

[mypy-psutil.*]
ignore_missing_imports = True

[mypy-paramiko.*]
ignore_missing_imports = True
