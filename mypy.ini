[mypy]
# The whole codebase is one package (`birdscanner`) with absolute imports, so a
# single pass covers everything:  mypy birdscanner tools tests
#
# Third-party / platform modules without type information.
# libcamera and picamera2 are Pi-only native bindings (not installable off-Pi);
# onnxruntime, psutil, paramiko and PIL ship no type stubs (PIL lacks a py.typed
# marker). cv2 (OpenCV) likewise ships no py.typed marker. onnx and matplotlib
# are used only by dev-only scripts under tools/ and ship no stubs either.
# Silence the missing-import noise so mypy reports only genuine type errors in
# our own code.

[mypy-libcamera.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-picamera2.*]
ignore_missing_imports = True

[mypy-onnxruntime.*]
ignore_missing_imports = True

[mypy-psutil.*]
ignore_missing_imports = True

[mypy-paramiko.*]
ignore_missing_imports = True

[mypy-onnx.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-cv2.*]
ignore_missing_imports = True
