[mypy]
# The whole codebase is one package (`birdscanner`) with absolute imports, so a
# single pass covers everything:  mypy birdscanner tools tests
#
# Third-party / platform modules without type information.
# libcamera and picamera2 are Pi-only native bindings (not installable off-Pi);
# onnxruntime, psutil, paramiko and PIL ship no type stubs (PIL lacks a py.typed
# marker). cv2 (OpenCV) likewise ships no py.typed marker. onnx, matplotlib and
# tqdm are used only by dev-only scripts under tools/ and ship no stubs either.
# Silence the missing-import noise so mypy reports only genuine type errors in
# our own code.

[mypy-libcamera.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-picamera2.*]
ignore_missing_imports = True

[mypy-onnxruntime.*]
ignore_missing_imports = True

[mypy-psutil.*]
ignore_missing_imports = True

[mypy-paramiko.*]
ignore_missing_imports = True

[mypy-onnx.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-cv2.*]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True

# torch, ultralytics and Sony's model-compression-toolkit / edge-mdt TPC are used
# only by the dev-only IMX500 emulator builder (tools/build_imx_emulator.py) and
# are installed in a separate throwaway venv (requirements.imx-emulator.txt), never
# in the project .venv — so silence their missing-import noise here too.
[mypy-torch.*]
ignore_missing_imports = True

[mypy-ultralytics.*]
ignore_missing_imports = True

[mypy-model_compression_toolkit.*]
ignore_missing_imports = True

[mypy-edgemdt_tpc.*]
ignore_missing_imports = True
