services:
  detector:
    build:
      context: .
      dockerfile: Dockerfile.detector
    privileged: true          # required for IMX500 camera access (/dev/video*, /dev/media*)
    restart: unless-stopped
    volumes:
      - data:/data
      - /run/udev:/run/udev:ro   # libcamera enumerates cameras via udev
      - /sys/kernel/debug:/sys/kernel/debug   # IMX500 firmware-upload progress lives in debugfs (fw_progress)
      - /usr/share/imx500-models:/usr/share/imx500-models:ro   # use the host's .rpk network models (the container's imx500-all apt package lacks the YOLO11n model the detector loads)
    devices:
      - /dev/dma_heap:/dev/dma_heap   # picamera2 allocates buffers from the DMA heap
    expose:
      - "8000"                  # on-demand snapshot server (internal; reached by the api service)
    env_file: .env

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - data:/data:ro         # read-only; detector owns all writes.
                              # Also carries the species-reference bank at
                              # /data/species_reference (SPECIES_REFERENCE_DIR);
                              # see .env.example.
    env_file: .env
    depends_on:
      - detector

volumes:
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/ssd/birdfinder-data
